<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alumnos - ESCENCIAL CONSULTORA</title>
    <link rel="stylesheet" href="style.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 50px;
            padding-top: 30px;
        }

        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .files-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 50px;
        }

        .file-card {
            background: white;
            border-radius: 10px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
            cursor: pointer;
            text-decoration: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .file-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
        }

        .file-card h3 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 1.3em;
        }

        .file-card p {
            color: #666;
            font-size: 0.9em;
            margin-bottom: 15px;
        }

        .file-card .badge {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 0.8em;
            margin-top: auto;
        }

        .loading {
            text-align: center;
            color: white;
            font-size: 1.1em;
            padding: 40px;
        }

        .error {
            background: #ff6b6b;
            color: white;
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
            text-align: center;
        }

        .empty {
            background: white;
            padding: 40px;
            border-radius: 10px;
            text-align: center;
            color: #666;
        }

        .stats {
            background: rgba(255,255,255,0.1);
            color: white;
            padding: 15px 25px;
            border-radius: 10px;
            text-align: center;
            margin-bottom: 30px;
            backdrop-filter: blur(10px);
        }

        .stats p {
            font-size: 1em;
        }

        .admin-link {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: white;
            color: #667eea;
            padding: 15px 25px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
            transition: all 0.3s ease;
        }

        .admin-link:hover {
            transform: scale(1.1);
            background: #667eea;
            color: white;
        }

        .no-data {
            background: rgba(255,255,255,0.1);
            border: 2px dashed white;
            padding: 40px;
            border-radius: 10px;
            text-align: center;
            color: white;
        }

        .no-data h2 {
            margin-bottom: 10px;
        }

        footer {
            text-align: center;
            color: rgba(255,255,255,0.7);
            padding: 20px;
            border-top: 1px solid rgba(255,255,255,0.1);
            margin-top: 40px;
            font-size: 0.9em;
        }

        @media (max-width: 768px) {
            header h1 {
                font-size: 1.8em;
            }

            .files-grid {
                grid-template-columns: 1fr;
            }

            .admin-link {
                width: calc(100% - 40px);
                right: 20px;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📚 Plataforma de Alumnos</h1>
            <p>ESCENCIAL CONSULTORA</p>
        </header>

        <div class="stats">
            <p>Total de recursos disponibles: <strong id="total-files">0</strong></p>
            <p id="last-sync" style="font-size: 0.9em; margin-top: 5px;"></p>
        </div>

        <div id="content" class="loading">
            <p>⏳ Cargando recursos...</p>
        </div>

        <footer>
            <p>Sistema de sincronización automática Drive → GitHub → Netlify</p>
        </footer>
    </div>

    <a href="admin.html" class="admin-link">⚙️ Admin</a>

    <script>
        async function loadFiles() {
            try {
                const response = await fetch('/index.json');
                const data = await response.json();
                
                const contentDiv = document.getElementById('content');
                const totalFiles = document.getElementById('total-files');
                const lastSync = document.getElementById('last-sync');

                totalFiles.textContent = data.files.length;
                
                if (data.lastSync) {
                    const date = new Date(data.lastSync);
                    const formatted = date.toLocaleDateString('es-ES', {
                        year: 'numeric',
                        month: 'long',
                        day: 'numeric',
                        hour: '2-digit',
                        minute: '2-digit'
                    });
                    lastSync.innerHTML = `<em>Última actualización: ${formatted}</em>`;
                }

                if (data.files.length === 0) {
                    contentDiv.innerHTML = `
                        <div class="no-data">
                            <h2>📭 Sin recursos</h2>
                            <p>Los archivos aparecerán aquí cuando se sincronicen desde Drive.</p>
                        </div>
                    `;
                    return;
                }

                let html = '<div class="files-grid">';
                
                data.files.forEach(file => {
                    const cleanName = file.name.replace('.html', '');
                    const title = cleanName
                        .split(/[-_]/)
                        .map(word => word.charAt(0).toUpperCase() + word.slice(1))
                        .join(' ');
                    
                    const modDate = new Date(file.modified);
                    const dateStr = modDate.toLocaleDateString('es-ES');

                    html += `
                        <a href="/${cleanName}" class="file-card">
                            <div>
                                <h3>📄 ${title}</h3>
                                <p>Archivo: ${file.name}</p>
                                <p style="font-size: 0.85em; color: #999;">Modificado: ${dateStr}</p>
                            </div>
                            <span class="badge">Abrir →</span>
                        </a>
                    `;
                });

                html += '</div>';
                contentDiv.innerHTML = html;

            } catch (error) {
                console.error('Error cargando archivos:', error);
                document.getElementById('content').innerHTML = `
                    <div class="error">
                        <strong>⚠️ Error al cargar los recursos</strong>
                        <p>${error.message}</p>
                        <p style="font-size: 0.9em; margin-top: 10px;">Intenta recargar la página.</p>
                    </div>
                `;
            }
        }

        // Cargar archivos cuando el DOM está listo
        document.addEventListener('DOMContentLoaded', loadFiles);

        // Auto-refresh cada 5 minutos
        setInterval(loadFiles, 5 * 60 * 1000);
    </script>
</body>
</html>
