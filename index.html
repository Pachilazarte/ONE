<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ONE - Plataforma de Proyectos</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1000px; margin: 0 auto; }
        header { text-align: center; color: white; margin-bottom: 30px; padding-top: 30px; }
        header h1 { font-size: 2.5em; margin-bottom: 10px; text-shadow: 2px 2px 4px rgba(0,0,0,0.3); }
        header p { font-size: 1.1em; opacity: 0.9; }
        .toolbar {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 10px;
            padding: 15px 25px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        .toolbar-info { color: white; }
        .toolbar-info p { margin: 3px 0; font-size: 0.95em; }
        .btn-sync {
            background: white;
            color: #667eea;
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-sync:hover { transform: scale(1.05); box-shadow: 0 5px 20px rgba(0,0,0,0.3); }
        .btn-sync:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }
        .files-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 50px;
        }
        .file-card {
            background: white;
            border-radius: 10px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
            text-decoration: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .file-card:hover { transform: translateY(-5px); box-shadow: 0 15px 40px rgba(0,0,0,0.3); }
        .file-card h3 { color: #667eea; margin-bottom: 10px; font-size: 1.3em; }
        .file-card p { color: #666; font-size: 0.9em; margin-bottom: 15px; }
        .file-card .badge {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 0.8em;
            margin-top: auto;
        }
        .loading { text-align: center; color: white; font-size: 1.1em; padding: 40px; }
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            background: white;
            color: #333;
            padding: 15px 25px;
            border-radius: 8px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
            z-index: 1000;
            display: none;
            min-width: 250px;
            border-left: 4px solid #667eea;
        }
        .toast.show { display: block; animation: slideIn 0.3s ease; }
        .toast.success { border-left-color: #28a745; }
        .toast.error { border-left-color: #dc3545; }
        .toast.info { border-left-color: #17a2b8; }
        @keyframes slideIn { from { transform: translateX(400px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .no-data {
            background: rgba(255,255,255,0.1);
            border: 2px dashed white;
            padding: 40px;
            border-radius: 10px;
            text-align: center;
            color: white;
        }
        .no-data h2 { margin-bottom: 10px; }
        .admin-link {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: white;
            color: #667eea;
            padding: 15px 25px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
            transition: all 0.3s ease;
        }
        .admin-link:hover { transform: scale(1.1); background: #667eea; color: white; }
        footer { text-align: center; color: rgba(255,255,255,0.7); padding: 20px; margin-top: 40px; font-size: 0.9em; }
        .spinner {
            border: 2px solid rgba(255,255,255,0.3);
            border-top: 2px solid white;
            border-radius: 50%;
            width: 16px;
            height: 16px;
            animation: spin 1s linear infinite;
            display: inline-block;
        }
        .btn-sync .spinner { border-color: rgba(102, 126, 234, 0.3); border-top-color: #667eea; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @media (max-width: 768px) {
            header h1 { font-size: 1.8em; }
            .files-grid { grid-template-columns: 1fr; }
            .toolbar { flex-direction: column; align-items: stretch; }
            .btn-sync { width: 100%; justify-content: center; }
        }
    </style>
</head>
<body>
    <div id="toast" class="toast"></div>

    <div class="container">
        <header>
            <h1>📚 ONE - Plataforma</h1>
            <p>ESCENCIAL CONSULTORA</p>
        </header>

        <div class="toolbar">
            <div class="toolbar-info">
                <p>📊 Total de recursos: <strong id="total-files">0</strong></p>
                <p id="last-sync" style="font-size: 0.85em; opacity: 0.9;"></p>
            </div>
            <button id="btn-sync" class="btn-sync" onclick="sincronizarAhora()">
                🔄 Sincronizar Ahora
            </button>
        </div>

        <div id="content" class="loading">
            <p>⏳ Cargando recursos...</p>
        </div>

        <footer>
            <p>Sistema automático Drive → GitHub → Netlify</p>
        </footer>
    </div>

    <a href="admin.html" class="admin-link">⚙️ Admin</a>

    <script>
        const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbw6HKcHaywg5K2UtSXcAPfh5HQgCrWqREiEJTebWQwD1QgNgXA52R25ZOOdCktrJ4TY5w/exec';

        async function loadFiles() {
            try {
                const response = await fetch('/index.json?t=' + Date.now());
                const data = await response.json();
                
                const contentDiv = document.getElementById('content');
                const totalFiles = document.getElementById('total-files');
                const lastSync = document.getElementById('last-sync');

                totalFiles.textContent = data.files.length;
                
                if (data.lastSync) {
                    const date = new Date(data.lastSync);
                    lastSync.innerHTML = `Última actualización: ${date.toLocaleString('es-ES')}`;
                }

                if (data.files.length === 0) {
                    contentDiv.innerHTML = `
                        <div class="no-data">
                            <h2>📭 Sin recursos disponibles</h2>
                            <p>Sube archivos HTML a Drive y haz clic en "Sincronizar Ahora"</p>
                        </div>
                    `;
                    return;
                }

                let html = '<div class="files-grid">';
                
                data.files.forEach(file => {
                    const cleanName = file.name.replace('.html', '');
                    const title = cleanName
                        .split(/[-_]/)
                        .map(word => word.charAt(0).toUpperCase() + word.slice(1))
                        .join(' ');
                    
                    const modDate = new Date(file.modified);
                    const dateStr = modDate.toLocaleDateString('es-ES');

                    html += `
                        <a href="/${cleanName}" class="file-card">
                            <div>
                                <h3>📄 ${title}</h3>
                                <p>Archivo: ${file.name}</p>
                                <p style="font-size: 0.85em; color: #999;">Modificado: ${dateStr}</p>
                                ${file.size ? `<p style="font-size: 0.85em; color: #999;">Tamaño: ${file.size}</p>` : ''}
                            </div>
                            <span class="badge">Abrir →</span>
                        </a>
                    `;
                });

                html += '</div>';
                contentDiv.innerHTML = html;

            } catch (error) {
                console.error('Error cargando archivos:', error);
                document.getElementById('content').innerHTML = `
                    <div class="no-data">
                        <h2>⚠️ Error al cargar</h2>
                        <p>${error.message}</p>
                    </div>
                `;
            }
        }

        async function sincronizarAhora() {
            const btn = document.getElementById('btn-sync');
            const originalText = btn.innerHTML;
            
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> Sincronizando...';

            showToast('⏳ Iniciando sincronización...', 'info');

            try {
                const response = await fetch(`${APPS_SCRIPT_URL}?action=sync`);
                const data = await response.json();

                if (data.exito) {
                    showToast(`✅ ${data.sincronizados}/${data.total} archivos sincronizados`, 'success');
                    
                    setTimeout(() => {
                        showToast('🔄 Recargando lista...', 'info');
                        loadFiles();
                    }, 5000);
                } else {
                    showToast(`❌ Error: ${data.mensaje}`, 'error');
                }

            } catch (error) {
                console.error('Error:', error);
                showToast(`❌ Error: ${error.message}`, 'error');
            } finally {
                btn.disabled = false;
                btn.innerHTML = originalText;
            }
        }

        function showToast(message, type = 'info') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast show ${type}`;
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 4000);
        }

        document.addEventListener('DOMContentLoaded', loadFiles);
        setInterval(loadFiles, 60 * 1000);
    </script>
</body>
</html>
