[build]
  command = "echo 'No build needed'"
  publish = "."

# IMPORTANTE: El orden de las reglas importa.
# Netlify evalúa de arriba hacia abajo.

# Regla 1: archivos estáticos en la raíz (index.html, admin.html, etc)
# Estos se sirven directamente sin redirección.

# Regla 2: archivos en /html/ se sirven directamente
[[redirects]]
  from = "/html/*"
  to = "/html/:splat"
  status = 200

# Regla 3: /algo.html → /html/algo.html
[[redirects]]
  from = "/*.html"
  to = "/html/:splat.html"
  status = 200
  force = false

# Regla 4: /algo (sin extensión) → /html/algo.html
[[redirects]]
  from = "/:page"
  to = "/html/:page.html"
  status = 200
  force = false

# Headers de seguridad
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Headers para JSON
[[headers]]
  for = "/*.json"
  [headers.values]
    Content-Type = "application/json"

# Headers para HTML
[[headers]]
  for = "/*.html"
  [headers.values]
    Content-Type = "text/html; charset=utf-8"