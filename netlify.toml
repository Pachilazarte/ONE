[build]
  command = "echo 'No build needed'"
  publish = "."

[[redirects]]
  from = "/:page"
  to = "/html/:page.html"
  status = 200
  force = false
  conditions = { Negate = true, Query = { file = ["*.html", "*.json", "*.js", "*.css", "*.png", "*.jpg", "*.gif", "*.svg"] } }

[[redirects]]
  from = "/*.html"
  to = "/html/:splat.html"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=()"

[[headers]]
  for = "/*.json"
  [headers.values]
    Content-Type = "application/json"

[[headers]]
  for = "/*.html"
  [headers.values]
    Content-Type = "text/html; charset=utf-8"
    Cache-Control = "max-age=3600"